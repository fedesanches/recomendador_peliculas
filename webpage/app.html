<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionFlix</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Poster search section ── */
    #poster-search {
      padding: 0 4% 48px;
    }
    .ps-heading { margin-bottom: 20px; }
    .ps-heading h2 { font-size: 1.35rem; font-weight: 900; margin-bottom: 4px; }
    .ps-heading p  { font-size: .83rem; color: var(--text-dim); }

    .ps-layout {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* Drop zone */
    .ps-dropzone {
      width: 200px;
      min-width: 200px;
      aspect-ratio: 2/3;
      border: 2px dashed rgba(255,255,255,.18);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      background: rgba(255,255,255,.02);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, background .2s, box-shadow .2s;
      overflow: hidden;
    }
    .ps-dropzone:hover, .ps-dropzone.drag-over {
      border-color: var(--red);
      background: rgba(229,9,20,.05);
      box-shadow: 0 0 24px rgba(229,9,20,.15);
    }

    .ps-idle {
      text-align: center;
      padding: 20px;
      pointer-events: none;
    }
    .ps-idle-icon  { font-size: 2.2rem; margin-bottom: 12px; opacity: .55; }
    .ps-idle-main  { font-size: .82rem; font-weight: 700; margin-bottom: 6px; }
    .ps-idle-hint  { font-size: .72rem; color: var(--text-dim); }

    /* Preview */
    .ps-preview {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
    }
    .ps-preview img {
      width: 100%; flex: 1;
      object-fit: cover;
    }
    .ps-preview-btns {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px 8px;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
    }
    .ps-btn-search {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--red); color: #fff;
      border: none; border-radius: 5px;
      font-size: .72rem; font-weight: 700; letter-spacing: .04em;
      padding: 7px 10px; cursor: pointer;
      transition: background .2s;
    }
    .ps-btn-search:hover:not(:disabled) { background: #c40812; }
    .ps-btn-search:disabled { opacity: .5; cursor: not-allowed; }
    .ps-btn-clear {
      background: rgba(255,255,255,.1); color: var(--text-dim);
      border: 1px solid rgba(255,255,255,.12); border-radius: 5px;
      font-size: .7rem; padding: 5px;
      cursor: pointer; transition: background .2s;
    }
    .ps-btn-clear:hover { background: rgba(255,255,255,.18); }

    /* Results area */
    .ps-results-area {
      flex: 1;
      min-width: 0;
    }
    .ps-results-loading {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 0;
      color: var(--text-dim); font-size: .85rem;
    }
    .ps-results-loading .spinner {
      width: 22px; height: 22px;
      border-width: 2px;
      flex-shrink: 0;
    }
    .ps-error {
      color: #f87171; font-size: .85rem; padding: 16px 0;
    }

    /* Reuse the modal's tab + row styles */
    #poster-search .ms-tabs { margin-bottom: 14px; }
    #poster-search .ps-movies-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #poster-search .ps-result-card { flex-shrink: 0; width: 130px; cursor: default; }
    #poster-search .ps-card-poster { position: relative; border-radius: 6px; overflow: hidden; aspect-ratio: 2/3; }
    #poster-search .ps-card-poster img { width: 100%; height: 100%; object-fit: cover; }
    #poster-search .ps-score-badge {
      position: absolute; bottom: 5px; right: 5px;
      background: rgba(0,0,0,.75);
      color: #46d369; font-size: .65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 3px;
    }
    #poster-search .ps-card-info { padding: 6px 2px 0; }
    #poster-search .ps-card-title { font-size: .72rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    #poster-search .ps-card-genres { font-size: .65rem; color: var(--text-dim); }

    @media (max-width: 600px) {
      .ps-layout { flex-direction: column; }
      .ps-dropzone { width: 100%; aspect-ratio: 16/7; min-width: unset; }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loader-logo">VISIONFLIX</div>
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <a href="/" class="nav-logo">VISIONFLIX</a>

    <ul class="nav-links">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Series</a></li>
      <li><a href="/arquitectura.html">Arquitectura</a></li>
      <li><a href="/metricas.html">Métricas</a></li>
    </ul>

    <div class="nav-right">
      <div class="search-wrap">
        <input
          type="search"
          id="search-input"
          placeholder="Buscar títulos, géneros..."
          autocomplete="off"
        >
        <div id="search-overlay">
          <div id="search-results"></div>
        </div>
      </div>
      <div class="nav-avatar" title="Usuario">U</div>
    </div>
  </nav>

  <!-- Hero banner -->
  <div id="hero"></div>

  <!-- Poster upload search -->
  <section id="poster-search">
    <div class="ps-heading">
      <h2>🎞 Buscar por portada</h2>
      <p>Subí la imagen de un póster para encontrar películas similares</p>
    </div>
    <div class="ps-layout">

      <div class="ps-dropzone" id="ps-dropzone">
        <input type="file" id="ps-file-input" accept="image/*" hidden>

        <div class="ps-idle" id="ps-idle">
          <div class="ps-idle-icon">🎬</div>
          <p class="ps-idle-main">Arrastrá un póster aquí</p>
          <p class="ps-idle-hint">o hacé click para seleccionar</p>
        </div>

        <div class="ps-preview" id="ps-preview" style="display:none">
          <img id="ps-preview-img" alt="Portada seleccionada">
          <div class="ps-preview-btns">
            <button class="ps-btn-search" id="ps-search-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              Buscar similares
            </button>
            <button class="ps-btn-clear" id="ps-clear-btn">✕ Cambiar imagen</button>
          </div>
        </div>
      </div>

      <div class="ps-results-area" id="ps-results-area" style="display:none">
        <div class="ps-results-loading" id="ps-results-loading" style="display:none">
          <div class="spinner"></div>
          <p>Buscando películas similares…</p>
        </div>
        <div id="ps-content" style="display:none">
          <div class="ms-tabs" id="ps-tabs"></div>
          <div id="ps-panels"></div>
        </div>
        <div class="ps-error" id="ps-error" style="display:none"></div>
      </div>

    </div>
  </section>

  <!-- Main content rows -->
  <main id="main-content"></main>

  <!-- Movie detail modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts: data → api → app -->
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
