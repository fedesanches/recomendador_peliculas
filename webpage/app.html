<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionFlix</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loader-logo">VISIONFLIX</div>
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <a href="/" class="nav-logo">VISIONFLIX</a>

    <ul class="nav-links">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Series</a></li>
      <li><a href="/arquitectura.html">Arquitectura</a></li>
      <li><a href="/metricas.html">Métricas</a></li>
    </ul>

    <div class="nav-right">
      <div class="search-wrap">
        <input
          type="search"
          id="search-input"
          placeholder="Buscar títulos, géneros..."
          autocomplete="off"
        >
        <div id="search-overlay">
          <div id="search-results"></div>
        </div>
      </div>
      <div class="nav-avatar" title="Usuario">U</div>
    </div>
  </nav>

  <!-- Hero banner -->
  <div id="hero"></div>

  <!-- Main content rows -->
  <main id="main-content"></main>

  <!-- Movie detail modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts: data → api → app -->
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
